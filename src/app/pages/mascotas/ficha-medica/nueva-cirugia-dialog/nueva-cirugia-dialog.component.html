<div style="padding:24px;">
  <h3 style="margin-bottom:16px;">Registrar cirugía</h3>
  <mat-form-field style="width:100%;margin-bottom:8px;">
    <mat-label>Fecha</mat-label>
    <input matInput [matDatepicker]="picker"
          [(ngModel)]="fecha"
          [max]="maxDate"
          readonly />
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
  <mat-form-field style="width:100%;">
    <mat-label>Descripción</mat-label>
    <textarea matInput [(ngModel)]="descripcion" rows="4"></textarea>
  </mat-form-field>
  <p *ngIf="error" style="color:red;font-size:12px;">{{ error }}</p>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
    <button mat-stroked-button (click)="close()">Cancelar</button>
    <button mat-raised-button style="background:#E86A10;color:white;" (click)="save()">Guardar</button>
  </div>
</div>
