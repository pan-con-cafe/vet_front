<div style="padding:24px;">
      <h3 style="margin-bottom:16px;">Nueva cita</h3>

      <mat-form-field style="width:100%;margin-bottom:8px;">
        <mat-label>Mascota</mat-label>
        <mat-select [(ngModel)]="form.mascota_FK">
          <mat-option *ngFor="let m of mascotas" [value]="m.idMascota">
            {{ m.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field style="width:100%;margin-bottom:8px;">
        <mat-label>Motivo</mat-label>
        <mat-select [(ngModel)]="form.typeCita_FK">
          <mat-option *ngFor="let t of tipos" [value]="t.idTypeCita">
            {{ t.type }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field style="width:100%;margin-bottom:8px;">
        <mat-label>Fecha</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="form.date" 
              [min]="minDate" readonly />
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <p *ngIf="error" style="color:red;font-size:12px;">{{ error }}</p>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button mat-stroked-button (click)="close()">Cancelar</button>
        <button mat-raised-button style="background:#E86A10;color:white;" (click)="save()">
          Guardar
        </button>
      </div>
    </div>
